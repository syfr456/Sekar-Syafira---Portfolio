<nav class="sticky top-0 z-50 w-full bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b border-gray-100 dark:border-gray-800">
  <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="font-bold text-xl tracking-tighter text-gray-900 dark:text-white">
      Sekar Syafira
    </div>

    <div class="hidden md:flex items-center space-x-8">
      <button
        *ngFor="let item of [
          {id:'tech-stack', label:content.stack}, 
          {id:'projects', label:content.projects}, 
          {id:'experience', label:content.experience}, 
          {id:'contact', label:content.contact}
        ]"
        (click)="scrollTo(item.id)"
        class="relative py-1 text-sm transition-all duration-300 group"
        [ngClass]="activeSection === item.id 
          ? 'text-blue-600 dark:text-blue-400 font-semibold' 
          : 'text-gray-600 dark:text-white font-medium hover:text-gray-900 dark:hover:text-blue-400'"
      >
        {{ item.label }}
        <span 
          class="absolute bottom-0 left-0 h-0.5 bg-current transition-all duration-300"
          [style.width]="activeSection === item.id ? '100%' : '0%'"
          [class.group-hover:width]="'100%'"
        ></span>
      </button>

      <div class="h-4 w-[1px] bg-gray-300 dark:bg-gray-700 mx-2"></div>

      <button (click)="toggleLanguage()" class="text-[10px] font-bold border border-gray-300 dark:border-gray-600 px-1.5 py-0.5 rounded text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        {{ currentLang }}
      </button>

      <button (click)="toggleDarkMode()" class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all hover:scale-110 active:scale-95 group">
        <svg *ngIf="isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-yellow-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
        <svg *ngIf="!isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
      </button>
    </div>

    <button (click)="toggleMenu()" class="md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none">
      <span class="block w-6 h-0.5 bg-gray-600 dark:bg-gray-300 transition-all duration-300" [class.rotate-45]="isMenuOpen" [class.translate-y-2]="isMenuOpen"></span>
      <span class="block w-6 h-0.5 bg-gray-600 dark:bg-gray-300 transition-all duration-300" [class.opacity-0]="isMenuOpen"></span>
      <span class="block w-6 h-0.5 bg-gray-600 dark:bg-gray-300 transition-all duration-300" [class.-rotate-45]="isMenuOpen" [class.-translate-y-2]="isMenuOpen"></span>
    </button>
  </div>
</nav>

<div *ngIf="isMenuOpen" class="md:hidden fixed inset-x-0 top-[64px] p-4 space-y-3 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 shadow-xl z-40 mobile-menu-animate">
  <button 
    *ngFor="let item of [
      {id:'tech-stack', label:content.stack}, 
      {id:'projects', label:content.projects}, 
      {id:'experience', label:content.experience}, 
      {id:'contact', label:content.contact}
    ]"
    (click)="scrollTo(item.id)" 
    class="w-full text-left px-4 py-3 rounded-lg text-base transition-all duration-200 border-l-4 font-medium"
    [ngClass]="activeSection === item.id
      ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 border-blue-600'
      : 'text-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 border-transparent'"
  >
    {{ item.label }}
  </button>

  <div class="border-t border-gray-200 dark:border-gray-700 my-2"></div>

  <button (click)="toggleLanguage()" class="w-full flex items-center justify-between px-4 py-3 rounded-lg text-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
    <span>{{ content.language }}</span>
    <span class="text-blue-600 dark:text-blue-400 font-bold">{{ currentLang }}</span>
  </button>

  <button (click)="toggleDarkMode()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800/50 transition-all active:scale-[0.98]">
    <span class="text-gray-700 dark:text-gray-300 font-medium">{{ content.theme }}</span>
    <div class="p-1.5 rounded-md bg-white dark:bg-gray-700 shadow-sm">
      <svg *ngIf="isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-yellow-400">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
      </svg>
      <svg *ngIf="!isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-600">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
      </svg>
    </div>
  </button>
</div>
