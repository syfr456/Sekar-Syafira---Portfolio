<section id="tech-stack" class="pt-16 pb-8 max-w-4xl mx-auto px-6 transition-colors duration-300">
  <div class="mb-10">
    <h2 class="text-3xl font-bold tracking-tighter text-gray-900 dark:text-white uppercase">
      {{ content.title }}
    </h2>
    <div class="h-1 w-12 bg-blue-600 mt-2 rounded-full"></div>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
    <app-tech-card 
      *ngFor="let tech of content.items" 
      [name]="tech">
    </app-tech-card>
  </div>
</section>
