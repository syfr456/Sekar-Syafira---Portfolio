<section id="experience" class="pt-16 pb-8 max-w-4xl mx-auto px-6 transition-colors duration-300">
  <div class="mb-8"> <h2 class="text-3xl font-bold tracking-tighter text-gray-900 dark:text-white uppercase">
      {{ content.title }}
    </h2>
    <div class="h-1 w-12 bg-blue-600 mt-2 rounded-full"></div>
  </div>

  <div class="space-y-6 border-l-2 border-gray-100 dark:border-gray-800 ml-4">
    <div *ngFor="let exp of content.items" class="relative pl-8 group">
      <div class="absolute -left-[9px] top-1.5 w-4 h-4 rounded-full border-2 border-white dark:border-gray-900 bg-blue-600 transition-transform group-hover:scale-125"></div>
      
      <div class="p-5 rounded-2xl bg-gray-50/50 dark:bg-gray-800/40 border border-transparent hover:border-blue-500/30 transition-all duration-300">
        <h3 class="font-bold text-lg text-gray-900 dark:text-white leading-none">
          {{ exp.role }}
        </h3>
        <p class="text-blue-600 dark:text-blue-400 font-medium mt-2">
          {{ exp.company }}
        </p>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 italic">
          {{ exp.period }}
        </p>
      </div>
    </div>
  </div>
</section>
