<section
  class="mt-12 py-20 px-8 rounded-3xl transition-all duration-500 bg-gray-50 dark:bg-gray-800/20 border border-transparent dark:border-gray-700/50"
>
  <h1
    class="text-4xl md:text-5xl font-extrabold tracking-tighter text-gray-900 dark:text-white uppercase leading-tight"
  >
    {{ content.greeting }} <br />
    <span class="text-blue-600 dark:text-blue-400">SEKAR SYAFIRA</span>
  </h1>

  <p class="mt-6 text-lg md:text-xl text-gray-600 dark:text-gray-400 max-w-2xl leading-relaxed">
    {{ content.role }}
    <b class="text-gray-900 dark:text-white">{{ content.highlight }}</b>
    {{ content.with }}
  </p>

  <div class="mt-10 flex flex-wrap gap-4">
    <button
      (click)="scrollToProjects()"
      class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20"
    >
      {{ content.cta }}
    </button>

    <a
      href="https://drive.google.com/file/d/1udL6bc7Ornl46H2a2XwtbmUqS9LMgNLU/view?usp=sharing"
      download="CV_Sekar_Syafira.pdf"
      class="inline-block px-8 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-bold rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-all text-center"
    >
      {{ content.resumeLabel || 'RESUME' }}
    </a>
  </div>
</section>
